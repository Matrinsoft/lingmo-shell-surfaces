name: Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deb:
    runs-on: ubuntu-24.04
    container: debian:trixie
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git

      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq build-essential cmake ninja-build debhelper dpkg-dev \
            qt6-base-dev qt6-declarative-dev qt6-wayland-dev \
            libwayland-dev libxcb1-dev libx11-dev \
            curl jq

      - name: Download lingmo-utils
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-utils/releases/latest \
            | jq -r '.assets[] | select(.name | (startswith("liblingmoutils1") or startswith("liblingmoutils-dev")) and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dpkg -i /tmp/liblingmoutils*.deb || apt-get install -y -f

      - name: Download lingmo-config
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-config/releases/latest \
            | jq -r '.assets[] | select(.name | (startswith("liblingmoconfig1") or startswith("liblingmoconfig-dev")) and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dpkg -i /tmp/liblingmoconfig*.deb || apt-get install -y -f

      - name: Download lingmo-ipc
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-ipc/releases/latest \
            | jq -r '.assets[] | select(.name | (startswith("liblingmoipc1") or startswith("liblingmoipc-dev")) and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dpkg -i /tmp/liblingmoipc*.deb || apt-get install -y -f

      - name: Download lingmo-plugin
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-plugin/releases/latest \
            | jq -r '.assets[] | select(.name | (startswith("liblingmoplugin1") or startswith("liblingmoplugin-dev")) and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dpkg -i /tmp/liblingmoplugin*.deb || apt-get install -y -f

      - name: Download lingmo-theme
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-theme/releases/latest \
            | jq -r '.assets[] | select(.name | (startswith("liblingmotheme1") or startswith("liblingmotheme-dev")) and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dpkg -i /tmp/liblingmotheme*.deb || apt-get install -y -f

      - name: Download lingmo-window
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-window/releases/latest \
            | jq -r '.assets[] | select(.name | (startswith("liblingmowindow1") or startswith("liblingmowindow-dev")) and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dpkg -i /tmp/liblingmowindow*.deb || apt-get install -y -f

      - name: Download lingmo-shell-core
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-shell-core/releases/latest \
            | jq -r '.assets[] | select(.name | (startswith("liblingmoshellcore1") or startswith("liblingmoshellcore-dev")) and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dpkg -i /tmp/liblingmoshellcore*.deb || apt-get install -y -f

      - name: Download lingmo-icon
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-icon/releases/latest \
            | jq -r '.assets[] | select(.name | (startswith("liblingmoicon1") or startswith("liblingmoicon-dev")) and endswith(".deb")) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dpkg -i /tmp/liblingmoicon*.deb || apt-get install -y -f

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p artifacts
          mv ../*.deb ../*.buildinfo ../*.changes artifacts/ 2>/dev/null || true

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: lingmo-shell-surfaces-deb
          path: artifacts/

  rpm:
    runs-on: ubuntu-24.04
    container: fedora:44
    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y cmake ninja-build rpm-build gcc-c++ \
            qt6-qtbase-devel qt6-qtdeclarative-devel qt6-qtwayland-devel \
            wayland-devel libxcb-devel libX11-devel \
            curl jq

      - name: Download lingmo-utils
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-utils/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".rpm") and (contains("debug") | not) and (contains("devel") or contains("libs"))) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dnf install -y /tmp/lingmo-utils-*.rpm

      - name: Download lingmo-config
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-config/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".rpm") and (contains("debug") | not) and (contains("devel") or contains("libs"))) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dnf install -y /tmp/lingmo-config-*.rpm

      - name: Download lingmo-ipc
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-ipc/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".rpm") and (contains("debug") | not) and (contains("devel") or contains("libs"))) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dnf install -y /tmp/lingmo-ipc-*.rpm

      - name: Download lingmo-plugin
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-plugin/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".rpm") and (contains("debug") | not) and (contains("devel") or contains("libs"))) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dnf install -y /tmp/lingmo-plugin-*.rpm

      - name: Download lingmo-theme
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-theme/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".rpm") and (contains("debug") | not) and (contains("devel") or contains("libs"))) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dnf install -y /tmp/lingmo-theme-*.rpm

      - name: Download lingmo-window
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-window/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".rpm") and (contains("debug") | not) and (contains("devel") or contains("libs"))) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dnf install -y /tmp/lingmo-window-*.rpm

      - name: Download lingmo-shell-core
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-shell-core/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".rpm") and (contains("debug") | not) and (contains("devel") or contains("libs"))) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dnf install -y /tmp/lingmo-shell-core-*.rpm

      - name: Download lingmo-icon
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-icon/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".rpm") and (contains("debug") | not) and (contains("devel") or contains("libs"))) | .browser_download_url')
          for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
          dnf install -y /tmp/lingmo-icon-*.rpm

      - name: Build RPM
        run: |
          mkdir -p /tmp/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cd .. && tar czf /tmp/rpmbuild/SOURCES/lingmo-shell-surfaces-1.0.0.tar.gz \
            --transform='s,^lingmo-shell-surfaces,lingmo-shell-surfaces-1.0.0,' \
            lingmo-shell-surfaces
          cd lingmo-shell-surfaces && cp rpm/lingmo-shell-surfaces.spec /tmp/rpmbuild/SPECS/
          rpmbuild -ba /tmp/rpmbuild/SPECS/lingmo-shell-surfaces.spec \
            --define "_topdir /tmp/rpmbuild"

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: lingmo-shell-surfaces-rpm
          path: /tmp/rpmbuild/RPMS/**/*.rpm
