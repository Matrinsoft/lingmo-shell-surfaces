          if [ -n "$ASSETS" ]; then
            for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
            dnf install -y /tmp/lingmo-ipc-*.rpm
          else
            git clone --depth 1 https://github.com/Matrinsoft/lingmo-ipc.git /tmp/lingmo-ipc
            cmake -S /tmp/lingmo-ipc -B /tmp/lingmo-ipc/build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=OFF
            cmake --build /tmp/lingmo-ipc/build --parallel && cmake --install /tmp/lingmo-ipc/build
          fi

      - name: Download lingmo-plugin
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-plugin/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".rpm") and (contains("debug") | not) and (contains("devel") or contains("libs"))) | .browser_download_url')
          if [ -n "$ASSETS" ]; then
            for url in $ASSETS; do curl -sL "$url" -o "/tmp/$(basename $url)"; done
            dnf install -y /tmp/lingmo-plugin-*.rpm
          else
            git clone --depth 1 https://github.com/Matrinsoft/lingmo-plugin.git /tmp/lingmo-plugin
            cmake -S /tmp/lingmo-plugin -B /tmp/lingmo-plugin/build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=OFF
            cmake --build /tmp/lingmo-plugin/build --parallel && cmake --install /tmp/lingmo-plugin/build
          fi

      - name: Download lingmo-theme
        run: |
          ASSETS=$(curl -sH "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Matrinsoft/lingmo-theme/releases/latest \
